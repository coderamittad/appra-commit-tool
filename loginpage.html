<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
}

/* Animated Jelly Blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    animation: move 12s infinite alternate ease-in-out;
}

.blob1 {
    width: 300px;
    height: 300px;
    background: #ff6ec4;
    top: 10%;
    left: 10%;
}

.blob2 {
    width: 250px;
    height: 250px;
    background: #00dbde;
    bottom: 10%;
    right: 10%;
    animation-delay: 3s;
}

@keyframes move {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(50px, -50px) scale(1.2); }
}

/* Glass Card */
.login-box {
    position: relative;
    z-index: 10;
    width: 360px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    animation: jelly 0.7s ease;
}

/* Jelly animation */
@keyframes jelly {
    0% { transform: scale(0.7); }
    50% { transform: scale(1.05); }
    75% { transform: scale(0.95); }
    100% { transform: scale(1); }
}

h2 {
    text-align: center;
    color: white;
    margin-bottom: 20px;
}

.form-control {
    border-radius: 12px;
    border: none;
    padding: 10px;
}

.form-control:focus {
    box-shadow: none;
}

.btn-custom {
    background: white;
    color: #6a11cb;
    border-radius: 12px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-custom:hover {
    background: #6a11cb;
    color: white;
}

.links {
    text-align: center;
    margin-top: 15px;
}

.links a {
    color: white;
    text-decoration: none;
    font-size: 14px;
}

.links a:hover {
    text-decoration: underline;
}

/* Center */
.container-center {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
</style>
</head>

<body>

<!-- Jelly blobs -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container-center">
    <div class="login-box">
        <h2>Welcome Back</h2>

        <form>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email">
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Password">
            </div>

            <button class="btn btn-custom w-100">Login</button>
        </form>

        <div class="links">
            <a href="#">Forgot Password?</a><br>
            <a href="#">Create Account</a>
        </div>
    </div>
</div>

</body>
</html>
