<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0f172a;
            padding: 15px 30px;
            color: white;
        }

        nav h2 {
            font-size: 22px;
        }

        ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        ul li a {
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        ul li a:hover {
            color: #38bdf8;
        }

        /* Hamburger */
        .menu-toggle {
            display: none;
            font-size: 28px;
            cursor: pointer;
        }

        /* Mobile */
        @media (max-width: 768px) {
            ul {
                position: absolute;
                top: 60px;
                right: 0;
                background-color: #0f172a;
                width: 100%;
                flex-direction: column;
                align-items: center;
                display: none;
            }

            ul.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }

        main {
            padding: 40px;
            text-align: center;
        }

        footer {
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <h2>MySite</h2>

        <div class="menu-toggle" onclick="toggleMenu()">☰</div>

        <ul id="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    <h1>Welcome to My Website</h1>
    <p>This is a responsive navbar example.</p>
</main>

<footer>
    <p>© 2026 MySite. All rights reserved.</p>
</footer>

<script>
    function toggleMenu() {
        document.getElementById("menu").classList.toggle("active");
    }
</script>

</body>
</html>
